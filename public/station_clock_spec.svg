<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="500" height="500">
  <!-- 
    British Rail (BR) Standard Station Clock Specification SVG
    Designed with mathematical precision. Center point: (50, 50).
    You can edit this file in any vector graphics editor (Illustrator, Inkscape, Figma, etc.).
  -->

  <!-- Clean Off-White Background to assist visual editors -->
  <rect width="100" height="100" fill="#FFFFFF" />

  <!-- Outer Guide Boundary (Hidden/Transparent by default, representing the clock bezel outline) -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="#E2E8F0" stroke-width="0.2" />

  <!-- DIAL MARKINGS (TICKS) -->
  <g id="dial-ticks" stroke="#000000" stroke-linecap="butt">
    <!-- 12 O'Clock Bold Block Mark (Length 18, Width 5.8) -->
    <line x1="50" y1="2" x2="50" y2="20" stroke-width="5.8" transform="rotate(0 50 50)" />

    <!-- Minute Marks (Length 3.5, Width 0.8) -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(6 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(12 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(18 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(24 50 50)" />

    <!-- 5 Minute Mark / 1 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(30 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(36 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(42 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(48 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(54 50 50)" />

    <!-- 10 Minute Mark / 2 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(60 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(66 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(72 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(78 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(84 50 50)" />

    <!-- 15 Minute Mark / 3 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(90 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(96 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(102 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(108 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(114 50 50)" />

    <!-- 20 Minute Mark / 4 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(120 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(126 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(132 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(138 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(144 50 50)" />

    <!-- 25 Minute Mark / 5 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(150 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(156 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(162 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(168 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(174 50 50)" />

    <!-- 30 Minute Mark / 6 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(180 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(186 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(192 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(198 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(204 50 50)" />

    <!-- 35 Minute Mark / 7 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(210 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(216 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(222 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(228 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(234 50 50)" />

    <!-- 40 Minute Mark / 8 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(240 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(246 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(252 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(258 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(264 50 50)" />

    <!-- 45 Minute Mark / 9 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(270 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(276 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(282 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(288 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(294 50 50)" />

    <!-- 50 Minute Mark / 10 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(300 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(306 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(312 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(318 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(324 50 50)" />

    <!-- 55 Minute Mark / 11 O'Clock (Length 12, Width 2.8) -->
    <line x1="50" y1="2" x2="50" y2="14" stroke-width="2.8" transform="rotate(330 50 50)" />

    <!-- Minute Marks -->
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(336 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(342 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(348 50 50)" />
    <line x1="50" y1="2" x2="50" y2="5.5" stroke-width="0.8" transform="rotate(354 50 50)" />
  </g>

  <!-- CLOCK HANDS (Reference positions at 10:10:35) -->

  <!-- Hour Hand Group (Adjust transform="rotate(angle 50 50)" dynamically) -->
  <g id="hour-hand" transform="rotate(305 50 50)">
    <!-- Parallel rectangular profile with historical back-overhang -->
    <line x1="50" y1="24" x2="50" y2="59" stroke="#000000" stroke-width="5.2" stroke-linecap="butt" />
  </g>

  <!-- Minute Hand Group (Adjust transform="rotate(angle 50 50)" dynamically) -->
  <g id="minute-hand" transform="rotate(60 50 50)">
    <!-- Parallel rectangular profile with historical back-overhang -->
    <line x1="50" y1="8" x2="50" y2="59" stroke="#000000" stroke-width="3.4" stroke-linecap="butt" />
  </g>

  <!-- Sweep Second Hand Group (Adjust transform="rotate(angle 50 50)" dynamically) -->
  <g id="second-hand" transform="rotate(210 50 50)">
    <!-- Tapered sweep profile from back counterweight to tip -->
    <polygon points="49.65,62 50.35,62 50.65,53 50.65,47 50.175,5 49.825,5 49.35,47 49.35,53" fill="#E5001C" />
    <!-- Integrated red center boss -->
    <circle cx="50" cy="50" r="1.8" fill="#E5001C" />
  </g>

  <!-- Center Pin Assembly (Placed on top of all hands) -->
  <g id="center-pin">
    <circle cx="50" cy="50" r="2.8" fill="#000000" />
    <circle cx="50" cy="50" r="1.2" fill="#9CA3AF" />
  </g>
</svg>
