<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./src/assets/images/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="An independent guide to UK rail. Find cheap fares, split-ticketing tips, and explore iconic British railway design history." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="britishrail.co.uk" />

    <title>British Rail | Find cheaper rail tickets - quick & easy</title>
  </head>
  <body>
    <!-- The fallback box starts as visible by default for safety -->
    <div id="legacy-browser-warning" style="padding: 24px; font-family: sans-serif; text-align: center; background-color: #ffffff; color: #333333;">
      <div style="margin-bottom: 30px;">
        <img src="./src/assets/images/logo-sml.png" alt="British Rail Guide Logo" style="max-width: 280px; height: auto; display: inline-block;" />
      </div>
      <h2 style="color: #003366; margin-top: 40px;">A More Modern Carriage (Browser :) is Required</h2>
      <p>To view the British Rail interactive design archives, a more modern web browser is required.</p>
      <p>Please update your device or switch to a modern browser like recent versions of <strong>Google Chrome, Brave, Mozilla Firefox, or Safari</strong>.</p>
    </div>

    <!-- 1. Modern browsers running this script will instantly hide the warning box before it renders -->
    <script type="module">
      document.getElementById('legacy-browser-warning').style.display = 'none';
    </script>

    <!-- 2. Old browsers don't support type="module", so they skip it.  -->
    <script nomodule>
      document.getElementById('legacy-browser-warning').style.display = 'block';
    </script>

    <!-- 3. Standard No-JS Fallback -->
    <noscript>
      <style>#legacy-browser-warning { display: none !important; text-align: center; background-color: #ffffff; color: #333333;}</style>
      <div style="margin-bottom: 30px; text-align: center; background-color: #ffffff; color: #333333;">
        <img src="./src/assets/images/logo-sml.png" alt="British Rail Guide Logo" style="max-width: 280px; height: auto; display: inline-block;" />
      </div>
      <div style="padding: 24px; font-family: sans-serif; text-align: center; background-color: #ffffff; color: #333333;">
        <h2 style="color: #003366;">JavaScript Required</h2>
        <p>To view the British Rail interactive design archives please enable JavaScript or use a modern web browser.</p>
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
